version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      semantic-release:
        patterns:
          - "@semantic-release/*"
          - "semantic-release"
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
    cooldown:
      default-days: 15
      semver-major-days: 30
      semver-minor-days: 15 
      semver-patch-days: 15 
